app = 'sc-prints-backend'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '9000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  port = 9000
  timeout = '10s'
  type = 'http'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
