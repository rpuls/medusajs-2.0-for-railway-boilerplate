app = 'sc-prints-backend'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = '9000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 9000
  force_https = true
  # Always-warm: 'stop' auto-suspends idle machines to disk which forces a
  # 10+ second cold-boot on next request (machine restart + container start
  # + Node bootstrap + DB connection pool warm). Backend is on the hot path
  # for every storefront SSR — cannot tolerate that latency. 'off' pins the
  # machine in `started` state 24/7. Costs ~$5-10/mo extra for the 2GB
  # shared-cpu-1x machine; well worth it vs the customer UX hit.
  # If we ever want to scale-to-zero for cost savings, prefer 'suspend' over
  # 'stop' — suspends to RAM and wakes in ~250ms instead of 10+s.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  port = 9000
  timeout = '10s'
  type = 'http'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
