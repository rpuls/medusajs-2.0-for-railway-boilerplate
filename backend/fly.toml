app = 'sc-prints-backend'
primary_region = 'syd'

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Run migrations once per deploy, not on every boot.
  # This moves the 2-4 minute migration step out of the hot path.
  release_command = "sh -c 'cd .medusa/server && npx medusa db:migrate && npx medusa db:sync-links'"

[env]
  PORT = '9000'
  NODE_ENV = 'production'

[http_service]
  internal_port = 9000
  force_https = true
  # Testing suspend first (~250ms wake). Use 'off' for always-warm if SSR is still slow.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  port = 9000
  timeout = '10s'
  type = 'http'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
